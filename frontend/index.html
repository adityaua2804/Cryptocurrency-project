<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLabCoin (MLC) - Token Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">MLC</div>
                <h1>MyLabCoin</h1>
            </div>
            <button id="connectBtn" class="btn btn-primary">Connect Wallet</button>
        </header>

        <!-- Connection Status -->
        <div id="connectionStatus" class="status-bar hidden">
            <span class="status-dot"></span>
            <span id="walletAddress">Not connected</span>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Token Info Card -->
            <section class="card token-info">
                <h2>Token Information</h2>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="label">Name</span>
                        <span class="value" id="tokenName">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Symbol</span>
                        <span class="value" id="tokenSymbol">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Decimals</span>
                        <span class="value" id="tokenDecimals">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Total Supply</span>
                        <span class="value" id="totalSupply">-</span>
                    </div>
                </div>
            </section>

            <!-- Balance Card -->
            <section class="card balance-card">
                <h2>Your Balance</h2>
                <div class="balance-display">
                    <span id="userBalance" class="balance-amount">0.00</span>
                    <span class="balance-symbol">MLC</span>
                </div>
            </section>

            <!-- Transfer Card -->
            <section class="card transfer-card">
                <h2>Transfer Tokens</h2>
                <form id="transferForm">
                    <div class="form-group">
                        <label for="transferTo">Recipient Address</label>
                        <input type="text" id="transferTo" placeholder="0x..." required>
                    </div>
                    <div class="form-group">
                        <label for="transferAmount">Amount (MLC)</label>
                        <input type="number" id="transferAmount" placeholder="0.00" step="any" min="0" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Send Tokens</button>
                </form>
            </section>

            <!-- Approve Card -->
            <section class="card approve-card">
                <h2>Approve Spender</h2>
                <form id="approveForm">
                    <div class="form-group">
                        <label for="spenderAddress">Spender Address</label>
                        <input type="text" id="spenderAddress" placeholder="0x..." required>
                    </div>
                    <div class="form-group">
                        <label for="approveAmount">Allowance Amount (MLC)</label>
                        <input type="number" id="approveAmount" placeholder="0.00" step="any" min="0" required>
                    </div>
                    <button type="submit" class="btn btn-secondary btn-full">Approve</button>
                </form>
            </section>

            <!-- Check Allowance Card -->
            <section class="card allowance-card">
                <h2>Check Allowance</h2>
                <form id="allowanceForm">
                    <div class="form-group">
                        <label for="ownerAddress">Owner Address</label>
                        <input type="text" id="ownerAddress" placeholder="0x..." required>
                    </div>
                    <div class="form-group">
                        <label for="spenderCheck">Spender Address</label>
                        <input type="text" id="spenderCheck" placeholder="0x..." required>
                    </div>
                    <button type="submit" class="btn btn-secondary btn-full">Check Allowance</button>
                </form>
                <div id="allowanceResult" class="result-display hidden">
                    <span class="label">Allowance:</span>
                    <span id="allowanceValue" class="value">0.00 MLC</span>
                </div>
            </section>
        </main>

        <!-- Transaction Status -->
        <div id="txStatus" class="tx-status hidden">
            <div class="tx-content">
                <span id="txMessage">Processing transaction...</span>
                <button id="closeTx" class="close-btn">&times;</button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>MyLabCoin Token Dashboard - BCL Project</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
